<div class="min-h-screen p-8">

  <!-- Header -->
  <header class="text-center mb-8">
    <h1 class="pixel text-4xl font-extrabold text-gray-700 mb-2 flex items-center justify-center gap-3">
      <img src="leaf-logo.png" alt="logo" class="w-8 h-8 object-contain" />
      Adopt A Plant
      <img src="leaf-logo.png" alt="logo" class="w-8 h-8 object-contain" />
    </h1>
    <p class="text-gray-400 text-sm mb-4">✿ Un endroit cosy où les petites plantes trouvent leur foyer ✿</p>
    <ng-container *ngIf="plants$ | async as plants">
      <span class="bg-green-100 text-green-600 px-4 py-1 rounded-full text-sm font-semibold">
        {{ countAdopted(plants) }}/{{ plants.length }} adoptées
      </span>
    </ng-container>
  </header>

  <!-- Main content -->
  <main>

    <!-- Filters -->
    <section class="flex justify-center gap-3 mb-8" aria-label="Filtres">
      <button
        *ngFor="let f of filters"
        (click)="setFilter(f.value)"
        class="px-5 py-2 rounded-full font-semibold text-sm transition-colors duration-200"
        [ngClass]="filter() === f.value ? 'bg-green-400 text-white' : 'bg-white text-gray-500 hover:bg-gray-100'"
        [attr.aria-pressed]="filter() === f.value">
        {{ f.label }}
      </button>
    </section>

    <!-- Plants grid -->
    <ng-container *ngIf="plants$ | async as plants">
      <section
        class="grid grid-cols-1 xs:grid-cols-2 lg:grid-cols-4 gap-6 max-w-5xl mx-auto"
        aria-label="Liste des plantes">
        <app-plant-card
          *ngFor="let plant of filterPlants(plants)"
          [plant]="plant"
          (selected)="selectPlant($event)">
        </app-plant-card>
      </section>
    </ng-container>

  </main>

  <!-- Modal -->
  <app-plant-detail
    *ngIf="selectedPlant()"
    [plant]="selectedPlant()!"
    (closed)="closeDetail()"
    (toggled)="toggleAdopt($event)">
  </app-plant-detail>

</div>
