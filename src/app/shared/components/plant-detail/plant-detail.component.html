<!-- Overlay -->
<div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50 p-4" (click)="onClose()">
  
  <!-- Modal -->
  <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-xl relative" (click)="$event.stopPropagation()">
    
    <!-- Close button -->
    <button (click)="onClose()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">✕</button>

    <!-- Image -->
    <div class="flex justify-center mb-4">
      <img [src]="plant.imageUrl" [alt]="plant.name" class="w-36 h-36 object-contain" />
    </div>

    <!-- Name -->
    <h2 class="text-center font-bold text-gray-700 text-2xl mb-1">{{ plant.name }}</h2>

    <!-- Rarity -->
    <div class="flex justify-center mb-4">
      <span class="px-3 py-1 rounded-full text-xs font-semibold"
        [ngClass]="{
          'bg-gray-100 text-gray-500': plant.rarity === 'common',
          'bg-yellow-100 text-yellow-600': plant.rarity === 'uncommon',
          'bg-pink-100 text-pink-500': plant.rarity === 'rare',
          'bg-purple-100 text-purple-600': plant.rarity === 'legendary'
        }">
        ⭐ {{ plant.rarity }}
      </span>
    </div>

    <!-- Description -->
    <p class="text-center text-gray-500 text-sm mb-4">{{ plant.description }}</p>

    <!-- Mood -->
    <div class="flex justify-center mb-6">
      <span class="bg-yellow-50 text-yellow-600 px-4 py-1 rounded-full text-sm font-medium">
        Humeur : {{ plant.mood }} 😊
      </span>
    </div>

    <!-- Adopt button -->
    <button
      (click)="onToggle()"
      class="w-full py-3 rounded-2xl font-bold text-white transition-colors duration-200"
      [ngClass]="plant.adopted ? 'bg-red-400 hover:bg-red-500' : 'bg-green-500 hover:bg-green-600'">
      {{ plant.adopted ? 'Retirer du jardin' : 'Adopter cette plante ✨' }}
    </button>

  </div>
</div>
