<article
  (click)="onSelect()"
  class="relative bg-white rounded-3xl p-4 cursor-pointer transition-all duration-200 border-2 border-gray-100 hover:-translate-y-1 hover:border-green-500 hover:shadow-[0_8px_24px_rgba(34,197,94,0.3)]"
  [attr.aria-label]="'Voir le détail de ' + plant.name"
>
  <!-- Adopted badge -->
  <div
    *ngIf="plant.adopted"
    class="absolute -top-2 -right-2 bg-pink-400 rounded-full w-8 h-8 flex items-center justify-center shadow-md"
    aria-label="Plante adoptée">
    <span class="text-white text-xs" aria-hidden="true">♥</span>
  </div>

  <!-- Plant image -->
  <figure class="flex justify-center mb-3 h-28">
    <img
      [src]="plant.imageUrl"
      [alt]="plant.name"
      class="w-24 h-24 object-contain plant-float"
    />
  </figure>

  <!-- Plant name -->
  <h2 class="pixel text-center font-bold text-gray-700 text-lg">{{ plant.name }}</h2>

  <!-- Description -->
  <p class="text-center text-gray-400 text-sm mt-1 line-clamp-2">{{ plant.description }}</p>

  <!-- Rarity badge -->
  <div class="flex justify-center mt-3">
    <span class="px-3 py-1 rounded-full text-xs font-semibold"
      [ngClass]="{
        'bg-gray-100 text-gray-500': plant.rarity === 'Commun',
        'bg-yellow-100 text-yellow-600': plant.rarity === 'Peu commun',
        'bg-pink-100 text-pink-500': plant.rarity === 'Rare',
        'bg-purple-100 text-purple-600': plant.rarity === 'Légendaire'
      }">
      {{ plant.rarity }}
    </span>
  </div>

</article>
